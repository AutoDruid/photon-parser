name: Go CI

on:
  push:

jobs:
  fmt_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check gofmt
        run: gofmt -w .

      - name: Build
        run: go build ./...
